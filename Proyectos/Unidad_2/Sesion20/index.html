<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda V2</title>
    <link rel="stylesheet" href="css/agenda1.css">
</head>

<body>
    <div class="Formulario">
        <h2>Agregar Contacto</h2>
        <form id="formulario">

            <div class="campos">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre">
            </div>

            <div class="campos">
                <label for="telefono">Teléfono:</label>
                <input type="text" id="telefono">
            </div>
            <div class="botones">
                <input type="button" value="Guardar" id="guardarBtn">
                <input type="button" value="Buscar" id="buscarBtn">
                <input type="button" value="Eliminar" id="eliminarBtn">
                <input type="button" value="Eliminar todos" id="eliminarTodosBtn">
            </div>

        </form>
    </div>
    <div class="Contactos">
        <h2>Lista de contactos</h2>
        <table class="tabla-contactos">
            <thead>
                <th>Nombre</th>
                <th>Teléfono</th>
            </thead>
            <tbody id="listaContactos">
               <td></td>
               <td></td>
            </tbody>
        </table>
    </div>

    <script src="js/agenda1.js"></script>
</body>

</html>
