<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/pacman.css">
    <title>Pac-Man</title>
</head>
<body>
    
    <div class="maze">
        
        <div class="energizer e-top-left"></div>
        <div class="energizer e-top-right"></div>
        <div class="energizer e-bottom-left"></div>
        <div class="energizer e-bottom-right"></div>

        <div class="wall wall-tl"></div>
        <div class="wall wall-tm"></div>
        <div class="wall wall-tr"></div>
        <div class="wall wall-ml"></div>
        <div class="wall ghost-house">
            <div class="door"></div>
        </div>
        <div class="wall wall-mr"></div>
        <div class="wall wall-bl"></div>
        <div class="wall wall-bm"></div>
        <div class="wall wall-br"></div>

        <div class="pacman">
            <div class="pacman-top"></div>
            <div class="pacman-bottom"></div>
        </div>

        <div class="ghost scared ghost-1">
            <div class="eyes-scared">
                <span class="eye-scared"></span><span class="eye-scared"></span>
            </div>
            <div class="mouth-scared"></div>
        </div>
        
        <div class="ghost scared ghost-2">
            <div class="eyes-scared">
                <span class="eye-scared"></span><span class="eye-scared"></span>
            </div>
            <div class="mouth-scared"></div>
        </div>

        <div class="ghost scared ghost-3">
            <div class="eyes-scared">
                <span class="eye-scared"></span><span class="eye-scared"></span>
            </div>
            <div class="mouth-scared"></div>
        </div>
        
    </div>

</body>
</html>
