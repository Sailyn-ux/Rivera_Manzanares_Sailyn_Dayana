<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>

</head>

<body>

    <div class="contenedor">

        <div class="izquierda">
            <h1>Bienvenido</h1>

            <p>
                Para unirte a nuestra comunidad por favor inicia sesión con tus datos
            </p>

            <button>Iniciar sesión</button>
        </div>

        <div class="derecha">

            <h1>Nuevo Usuario</h1>

            <div class="botones-sociales">
                <button>Registro con Facebook</button>
                <button>Registro con google</button>
            </div>

            <p class="texto">O registrarse con</p>

            <form>

                <div class="fila">
                    <input type="text" class="nombre" placeholder="Nombres">

                    <input type="text" class="apellido" placeholder="Apellidos">
                </div>

                <input type="email" class="correo" placeholder="micorreo@dominio"><br>

                <input type="password" class="password" placeholder="su contrasena"><br>

                <div class="terminos">
                    <input type="checkbox">

                    Al crear esta cuenta, aceptas nuestros
                    <b>terminos & condiciones</b>
                </div>

                <input type="submit" value="Enviar" class="enviar">

            </form>

        </div>

    </div>

</body>

</html>
