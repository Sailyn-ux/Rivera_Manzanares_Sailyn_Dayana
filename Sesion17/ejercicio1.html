<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS en el head</title>
    <script>
        base=prompt ("Ingrese la base del rectángulo");
        altura=prompt("Ingrese la altura del rectángulo");

        area=base*altura;
        perimetro=(base+altura)*2;

        alert("Área del rectángulon\n"+"Area: "+area+"m2\n"+"Perimetro: "+perimetro+"m");
    </script>
</head>
<body>
    <h1>Uso de Java Script</h1>
    <p>Calculo realizado</p>
</body>
</html>
